name: Catalog Service

on:
  push:
    paths:
      - catalog-service/**
      - pom.xml
      - .mvn/**
      - mvnw
      - mvnw.cmd
      - .github/workflows/catalog-service.yml
    branches:
      - main
  pull_request:
    branches: [main]
    paths:
      - catalog-service/**
      - pom.xml
      - .mvn/**
      - mvnw
      - mvnw.cmd
      - .github/workflows/catalog-service.yml

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw -ntp verify
