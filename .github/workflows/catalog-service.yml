name: Catalog Service

on:
  push:
    paths:
      - catalog-service/**
      - pom.xml
      - .mvn/**
      - mvnw
      - mvnw.cmd
      - .github/workflows/catalog-service.yml
    branches:
      - main
  pull_request:
    branches: [main]
    paths:
      - catalog-service/**
      - pom.xml
      - .mvn/**
      - mvnw
      - mvnw.cmd
      - .github/workflows/catalog-service.yml

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/bookstore-catalog-service

    steps:
      - uses: actions/checkout@v5

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw -ntp verify

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Publish Docker Image
        if: github.event_name == 'push'
        run: |
          ./mvnw -ntp -pl catalog-service spring-boot:build-image -DskipTests -Dspring-boot.build-image.imageName=${DOCKER_IMAGE_NAME}
          echo "Pushing the image ${DOCKER_IMAGE_NAME} to Docker Hub..."
          docker push ${DOCKER_IMAGE_NAME}
