version: "3"

vars:
  GOOS: "{{default OS .GOOS}}"
  MVNW: '{{if eq .GOOS "windows"}}cmd /c mvnw.cmd{{else}}./mvnw{{end}}'
  DC_DIR: "deployment/docker-compose"
  INFRA_DC_FILE: "{{.DC_DIR}}/infra.yml"
  APPS_DC_FILE: "{{.DC_DIR}}/apps.yml"
  SLEEP_CMD: '{{if eq .GOOS "windows"}}timeout{{else}}sleep{{end}}'
  CATALOG_SERVICE: "catalog-service"

tasks:
  default:
    desc: Run the default verification task
    cmds:
      - task: test

  test:
    desc: Run the full Maven verification build
    cmds:
      - "{{.MVNW}} -ntp clean verify"

  format:
    desc: Apply code formatting when a formatter is configured
    cmds:
      - echo "No formatter is configured yet."

  build:
    desc: Build the catalog service Docker image
    cmds:
      - "{{.MVNW}} -ntp -pl {{.CATALOG_SERVICE}} spring-boot:build-image -DskipTests"

  start_infra:
    desc: Start infrastructure services
    cmds:
      - "docker compose -f {{.INFRA_DC_FILE}} up -d"

  stop_infra:
    desc: Stop and remove infrastructure services
    cmds:
      - "docker compose -f {{.INFRA_DC_FILE}} stop"
      - "docker compose -f {{.INFRA_DC_FILE}} rm -f"

  restart_infra:
    desc: Restart infrastructure services
    cmds:
      - task: stop_infra
      - task: sleep
      - task: start_infra

  start:
    desc: Build and start all services
    deps: [build]
    cmds:
      - "docker compose -f {{.INFRA_DC_FILE}} -f {{.APPS_DC_FILE}} up -d"

  stop:
    desc: Stop and remove all services
    cmds:
      - "docker compose -f {{.INFRA_DC_FILE}} -f {{.APPS_DC_FILE}} stop"
      - "docker compose -f {{.INFRA_DC_FILE}} -f {{.APPS_DC_FILE}} rm -f"

  restart:
    desc: Rebuild and restart all services
    cmds:
      - task: stop
      - task: sleep
      - task: start

  logs:
    desc: Follow catalog service logs
    cmds:
      - "docker compose -f {{.INFRA_DC_FILE}} -f {{.APPS_DC_FILE}} logs -f {{.CATALOG_SERVICE}}"

  ps:
    desc: Show Compose service status
    cmds:
      - "docker compose -f {{.INFRA_DC_FILE}} -f {{.APPS_DC_FILE}} ps"

  config:
    desc: Validate the merged Compose configuration
    cmds:
      - "docker compose -f {{.INFRA_DC_FILE}} -f {{.APPS_DC_FILE}} config"

  sleep:
    desc: Wait before restarting services
    vars:
      DURATION: "{{default 5 .DURATION}}"
    cmds:
      - "{{.SLEEP_CMD}} {{.DURATION}}"
